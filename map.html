<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Nunito+Sans%3A400%2C600%2C700%2C800"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro%3A400%2C600%2C700%2C800"
    />
    <link rel="stylesheet" href="css/leaflet.css" />
    <link rel="stylesheet" href="css/L.Control.Locate.min.css" />
    <link rel="stylesheet" href="css/qgis2web.css" />
    <link rel="stylesheet" href="css/fontawesome-all.min.css" />
    <link rel="stylesheet" href="css/leaflet-search.css" />
    <link rel="stylesheet" href="css/leaflet-control-geocoder.Geocoder.css" />
    <link rel="stylesheet" href="css/leaflet-measure.css" />
    <style>
      html, body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
      #map {
        width: 100%;
        height: calc(100vh - 70px);
        padding: 0;
        margin: 0;
      }

      .nav-saya {
        width: 100%;
        height: 70px;
        display: flex;
        align-items: center;
        flex-shrink: 0;
        justify-content: space-between;
        background-color: #69088a;
      }

      .image-2-eUL {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .bungkus-gambar {
        margin-left: 50px;
        width: 15%; /* Atau lebar tertentu */
        overflow: hidden; /* Pastikan isi tidak keluar dari div */
      }

      .grup-1 {
        justify-content: center;
        display: flex;
      }

      .menu {
        margin-right: 30px;
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.3625;
        color: #ffffff;
        font-family: Nunito Sans, "Source Sans Pro";
        white-space: nowrap;
        flex-shrink: 0;
      }

      .menu:hover {
        background-color: #310141;
      }

      .lastin{
        margin-right: 100px;
      }

      /* ─── Responsive Navbar ─── */
      @media (max-width: 640px) {
        .nav-saya {
          height: auto;
          flex-wrap: wrap;
          padding: 8px 12px;
          gap: 6px;
        }
        .bungkus-gambar {
          margin-left: 0;
          width: 30%;
        }
        .grup-1 {
          width: 100%;
          justify-content: center;
          flex-wrap: wrap;
          gap: 4px;
          padding-bottom: 6px;
        }
        .menu {
          margin-right: 0;
          font-size: 14px;
          padding: 4px 10px;
        }
        .lastin {
          margin-right: 0;
        }
        #map {
          height: calc(100vh - 110px);
        }
      }

      /* ─── Popup Styling ─── */
      .popup-card {
        font-family: 'Nunito Sans', 'Source Sans Pro', sans-serif;
        font-size: 13px;
        min-width: 230px;
        max-width: 280px;
      }
      .popup-header {
        background: linear-gradient(135deg, #69088a, #270d30);
        color: #fff;
        padding: 10px 14px 8px;
        border-radius: 10px 10px 0 0;
      }
      .popup-header h3 {
        margin: 0 0 2px;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.3;
      }
      .popup-header small {
        opacity: 0.8;
        font-size: 11px;
      }
      .popup-body {
        padding: 10px 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .popup-body .row {
        display: flex;
        gap: 6px;
        align-items: flex-start;
      }
      .popup-body .label {
        color: #69088a;
        font-weight: 700;
        white-space: nowrap;
        min-width: 90px;
      }
      .popup-body .val {
        color: #333;
      }
      .popup-photo {
        width: 100%;
        max-height: 140px;
        object-fit: cover;
        border-radius: 6px;
        margin-top: 6px;
        border: 2px solid #e6d0f0;
      }
      .popup-badge {
        display: inline-block;
        background: #f3e8ff;
        color: #69088a;
        border-radius: 20px;
        padding: 2px 10px;
        font-size: 11px;
        font-weight: 700;
        margin-top: 2px;
      }
    </style>
    <title>Tugas Akhir Sistem Informasi Geografis - (Kelompok 3)</title>
  </head>
  <body>
    <!-- NAVBAR BANG -->
    <div class="nav-saya">
      <div class="bungkus-gambar">
        <a href="index.html">
          <img class="image-2-eUL" src="./assets/image-2.png" alt="Logo UNPAK" />
        </a>
      </div>
      <div class="grup-1">
        <a href="index.html" style="text-decoration: none;">
          <p class="menu">Home</p>
        </a>
        <a style="text-decoration: none;" href="map.html"><p class="menu">Map</p></a>
        <a style="text-decoration: none;" href="about.html"><p class="menu lastin">About</p></a>
      </div>
    </div>

    <!-- Peta akan di sini -->
    <div id="map"></div>
    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/L.Control.Locate.min.js"></script>
    <script src="js/leaflet.rotatedMarker.js"></script>
    <script src="js/leaflet.pattern.js"></script>
    <script src="js/leaflet-hash.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="js/rbush.min.js"></script>
    <script src="js/labelgun.min.js"></script>
    <script src="js/labels.js"></script>
    <script src="js/leaflet-control-geocoder.Geocoder.js"></script>
    <script src="js/leaflet-measure.js"></script>
    <script src="js/leaflet-search.js"></script>
    <script src="data/responden_1.js"></script>
    <script>
      var highlightLayer;
      function highlightFeature(e) {
        highlightLayer = e.target;

        if (e.target.feature.geometry.type === "LineString") {
          highlightLayer.setStyle({
            color: "#ffff00",
          });
        } else {
          highlightLayer.setStyle({
            fillColor: "#ffff00",
            fillOpacity: 1,
          });
        }
      }
      var map = L.map("map", {
        zoomControl: true,
        maxZoom: 28,
        minZoom: 1,
      }).fitBounds([
        [-6.601113779320069, 106.81091565088757],
        [-6.5984716104998, 106.81379385949202],
      ]);
      var hash = new L.Hash(map);
      map.attributionControl.setPrefix(
        '<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>'
      );
      var autolinker = new Autolinker({
        truncate: { length: 30, location: "smart" },
      });
      L.control.locate({ locateOptions: { maxZoom: 19 } }).addTo(map);
      var measureControl = new L.Control.Measure({
        position: "topleft",
        primaryLengthUnit: "meters",
        secondaryLengthUnit: "kilometers",
        primaryAreaUnit: "sqmeters",
        secondaryAreaUnit: "hectares",
      });
      measureControl.addTo(map);
      document.getElementsByClassName(
        "leaflet-control-measure-toggle"
      )[0].innerHTML = "";
      document.getElementsByClassName(
        "leaflet-control-measure-toggle"
      )[0].className += " fas fa-ruler";
      var bounds_group = new L.featureGroup([]);
      function setBounds() {}
      map.createPane("pane_OpenStreetMap_0");
      map.getPane("pane_OpenStreetMap_0").style.zIndex = 400;
      var layer_OpenStreetMap_0 = L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          pane: "pane_OpenStreetMap_0",
          opacity: 1.0,
          attribution: "",
          minZoom: 1,
          maxZoom: 28,
          minNativeZoom: 0,
          maxNativeZoom: 19,
        }
      );
      layer_OpenStreetMap_0;
      map.addLayer(layer_OpenStreetMap_0);

      function escHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function pop_responden_1(feature, layer) {
        layer.on({
          mouseout: function (e) {
            for (var k in e.target._eventParents) {
              e.target._eventParents[k].resetStyle(e.target);
            }
          },
          mouseover: highlightFeature,
        });
        var p = feature.properties;
        var fotoFile = p['foto'] ? p['foto'].split(/[\/\\]/).pop() : null;
        var fotoHtml = fotoFile
          ? '<img src="images/' + escHtml(fotoFile) + '" class="popup-photo"'
            + ' alt="Foto ' + escHtml(p['nama_tempat']) + '"'
            + ' onerror="this.style.display=\'none\'">'
          : '';
        var popupContent =
          '<div class="popup-card">'
          + '<div class="popup-header">'
          +   '<h3>' + escHtml(p['nama_tempat']) + '</h3>'
          +   '<small>&#128100; Surveyor: ' + escHtml(p['nama_reponden']) + '</small>'
          + '</div>'
          + '<div class="popup-body">'
          + (p['deskripsi']
              ? '<div class="row"><span class="label">&#128203; Deskripsi</span>'
                + '<span class="val">' + escHtml(p['deskripsi']) + '</span></div>' : '')
          + (p['cocok_untuk']
              ? '<div class="row"><span class="label">&#9989; Cocok untuk</span>'
                + '<span class="val"><span class="popup-badge">' + escHtml(p['cocok_untuk']) + '</span></span></div>' : '')
          + (p['luas(m2)']
              ? '<div class="row"><span class="label">&#128207; Luas</span>'
                + '<span class="val">' + escHtml(p['luas(m2)']) + ' m\u00b2</span></div>' : '')
          + (p['tanggal_survey']
              ? '<div class="row"><span class="label">&#128197; Tanggal</span>'
                + '<span class="val">' + escHtml(p['tanggal_survey']) + '</span></div>' : '')
          + fotoHtml
          + '</div></div>';
        layer.bindPopup(popupContent, { maxWidth: 300, className: 'custom-popup' });
      }

      function style_responden_1_0() {
        return {
          pane: "pane_responden_1",
          radius: 8.0,
          opacity: 1,
          color: "rgba(50,87,128,1.0)",
          dashArray: "",
          lineCap: "butt",
          lineJoin: "miter",
          weight: 2.0,
          fill: true,
          fillOpacity: 1,
          fillColor: "rgba(72,123,182,1.0)",
          interactive: true,
        };
      }
      map.createPane("pane_responden_1");
      map.getPane("pane_responden_1").style.zIndex = 401;
      map.getPane("pane_responden_1").style["mix-blend-mode"] = "normal";
      var layer_responden_1 = new L.geoJson(json_responden_1, {
        attribution: "",
        interactive: true,
        dataVar: "json_responden_1",
        layerName: "layer_responden_1",
        pane: "pane_responden_1",
        onEachFeature: pop_responden_1,
        pointToLayer: function (feature, latlng) {
          var context = {
            feature: feature,
            variables: {},
          };
          return L.circleMarker(latlng, style_responden_1_0(feature));
        },
      });
      bounds_group.addLayer(layer_responden_1);
      map.addLayer(layer_responden_1);
      var title = new L.Control();
      title.onAdd = function (map) {
        this._div = L.DomUtil.create("div", "info");
        this.update();
        return this._div;
      };
      title.update = function () {
        this._div.innerHTML =
          "<h2>Tugas Akhir Sistem Informasi Geografis - (Kelompok 3)</h2>";
      };
      title.addTo(map);
      var osmGeocoder = new L.Control.Geocoder({
        collapsed: true,
        position: "topleft",
        text: "Search",
        title: "Testing",
      }).addTo(map);
      document.getElementsByClassName(
        "leaflet-control-geocoder-icon"
      )[0].className += " fa fa-search";
      document.getElementsByClassName(
        "leaflet-control-geocoder-icon"
      )[0].title += "Search for a place";
      var baseMaps = {};
      L.control
        .layers(baseMaps, {
          '<img src="legend/responden_1.png" /> responden': layer_responden_1,
          OpenStreetMap: layer_OpenStreetMap_0,
        })
        .addTo(map);
      setBounds();
      var i = 0;
      layer_responden_1.eachLayer(function (layer) {
        var context = {
          feature: layer.feature,
          variables: {},
        };
        layer.bindTooltip(
          layer.feature.properties["nama_tempat"] !== null
            ? String(
                "<div style=\"color: #323232; font-size: 10pt; font-weight: bold; font-style: italic; font-family: 'Open Sans', sans-serif;\">" +
                  layer.feature.properties["nama_tempat"]
              ) + "</div>"
            : "",
          { permanent: true, offset: [-0, -16], className: "css_responden_1" }
        );
        labels.push(layer);
        totalMarkers += 1;
        layer.added = true;
        addLabel(layer, i);
        i++;
      });
      map.addControl(
        new L.Control.Search({
          layer: layer_responden_1,
          initial: false,
          hideMarkerOnCollapse: true,
          propertyName: "nama_tempat",
        })
      );
      document.getElementsByClassName("search-button")[0].className +=
        " fa fa-binoculars";
      resetLabels([layer_responden_1]);
      map.on("zoomend", function () {
        resetLabels([layer_responden_1]);
      });
      map.on("layeradd", function () {
        resetLabels([layer_responden_1]);
      });
      map.on("layerremove", function () {
        resetLabels([layer_responden_1]);
      });
    </script>
  </body>
</html>
